# ─── ConfigMap para el agente de CloudWatch ───────────────────────────────────
# Configura qué logs enviar a CloudWatch desde los pods
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudwatch-agent-config
  namespace: amazon-cloudwatch
data:
  cwagentconfig.json: |
    {
      "logs": {
        "metrics_collected": {
          "kubernetes": {
            "cluster_name": "despacho-cluster",
            "metrics_collection_interval": 60
          }
        },
        "force_flush_interval": 5,
        "log_stream_name": "{pod_name}",
        "logs_collected": {
          "files": {
            "collect_list": [
              {
                "file_path": "/var/log/containers/frontend*.log",
                "log_group_name": "/eks/despacho-cluster/frontend",
                "log_stream_name": "{hostname}"
              },
              {
                "file_path": "/var/log/containers/backend-despachos*.log",
                "log_group_name": "/eks/despacho-cluster/backend-despachos",
                "log_stream_name": "{hostname}"
              },
              {
                "file_path": "/var/log/containers/backend-ventas*.log",
                "log_group_name": "/eks/despacho-cluster/backend-ventas",
                "log_stream_name": "{hostname}"
              }
            ]
          }
        }
      }
    }
